name: word_crush_mobile
description: A Word Crush mobile game — Turkish word puzzle for iOS.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.0

  # Database
  objectbox: ^5.3.1
  objectbox_flutter_libs: ^5.3.1
  path_provider: ^2.0.15

  # Navigation
  go_router: ^14.8.1

  # Animations
  lottie: ^3.3.1

  # Audio
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  objectbox_generator: ^5.3.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/sounds/
    - assets/animations/
    - assets/images/
